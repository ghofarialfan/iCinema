name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'documentation/**'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'documentation/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests with coverage
        run: npm run test:coverage
        env:
          JWT_SECRET: ci-test-jwt-secret
          NODE_ENV: test

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --legacy-peer-deps

      - name: Run frontend tests with coverage
        run: npm run test:ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Create deployment package
        run: |
          mkdir -p deployment-package

          cp -r controller deployment-package/
          cp -r middleware deployment-package/
          cp -r models deployment-package/
          cp -r utils deployment-package/
          cp server.js deployment-package/
          cp package.json deployment-package/
          cp package-lock.json deployment-package/

          mkdir -p deployment-package/frontend
          cp -r frontend/build deployment-package/frontend/build

      - name: Install deployment package dependencies
        working-directory: deployment-package
        run: npm ci --omit=dev

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package/
          retention-days: 7
