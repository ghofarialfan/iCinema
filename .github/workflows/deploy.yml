name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          npm ci --prefix frontend --legacy-peer-deps

      - name: Build frontend
        run: |
          npm run build --prefix frontend

      - name: Create deployment package
        run: |
          mkdir -p deployment-package

          cp -r controller deployment-package/
          cp -r middleware deployment-package/
          cp -r models deployment-package/
          cp -r utils deployment-package/
          cp server.js deployment-package/
          cp package.json deployment-package/
          cp package-lock.json deployment-package/

          mkdir -p deployment-package/frontend
          cp -r frontend/build deployment-package/frontend/build

          printf "MONGODB_URL=%s\nJWT_SECRET=%s\nCLOUDINARY_CLOUD_NAME=%s\nCLOUDINARY_API_KEY=%s\nCLOUDINARY_API_SECRET=%s\n" "${{ secrets.MONGODB_URL }}" "${{ secrets.JWT_SECRET }}" "${{ secrets.CLOUDINARY_CLOUD_NAME }}" "${{ secrets.CLOUDINARY_API_KEY }}" "${{ secrets.CLOUDINARY_API_SECRET }}" > deployment-package/.env

      - name: Install deployment package
        working-directory: deployment-package
        run: npm ci --omit=dev
 
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.WEBAPP_NAME }}
          slot-name: 'Production'
          package: deployment-package
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
