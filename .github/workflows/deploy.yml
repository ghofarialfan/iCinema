name: Build & Deploy to Azure App Service
 
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '18' }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
 
      - name: Install backend dependencies
        run: npm ci
 
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
 
      - name: Build frontend
        working-directory: frontend
        run: npm run build
 
      - name: Create deployment package
        run: |
          mkdir -p deployment-package/frontend
          cp -r controller config middleware models utils deployment-package/
          cp server.js deployment-package/
          cp package*.json deployment-package/
          cp -r frontend/build deployment-package/frontend/
 
      - name: Install deployment package dependencies
        working-directory: deployment-package
        run: npm ci --omit=dev
 
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.WEBAPP_NAME }}
          slot-name: 'Production'
          package: deployment-package
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      
